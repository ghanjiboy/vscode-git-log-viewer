name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - run: npm run lint

      - run: npx @vscode/vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
